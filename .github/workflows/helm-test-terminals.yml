name: Test Terminals Helm Chart

on:
  pull_request:
    paths:
      - "charts/terminals/**"
  push:
    branches:
      - main
    paths:
      - "charts/terminals/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint terminals chart
        run: helm lint ./charts/terminals

  template:
    name: Template render
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Template terminals chart
        run: helm template terminals ./charts/terminals --namespace garnet > /dev/null
