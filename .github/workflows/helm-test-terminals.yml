name: Check Open WebUI Helm Charts (terminals)

on:
  pull_request:
    paths:
      - "charts/terminals/**"
  push:
    paths:
      - "charts/terminals/**"

jobs:
  lint-chart:
    name: Lint Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint terminals Helm Chart
        run: |
          helm lint ./charts/terminals

  test-template:
    name: Test Chart Template
    runs-on: ubuntu-latest
    needs: lint-chart

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up KinD Cluster
        uses: helm/kind-action@v1

      - name: Template terminals Helm Chart
        run: |
          helm template terminals ./charts/terminals \
            --namespace test-namespace --create-namespace > terminals.yaml

      - name: Apply and verify resources
        run: |
          kubectl create namespace test-namespace
          kubectl apply --namespace test-namespace -f terminals.yaml
          kubectl --namespace test-namespace get deployment -l app.kubernetes.io/part-of=open-terminal
          kubectl --namespace test-namespace get service -l app.kubernetes.io/part-of=open-terminal
          kubectl --namespace test-namespace get crd terminals.openwebui.com
