name: Test Open WebUI Helm Chart

on:
  pull_request:
    paths:
      - "charts/open-webui/**"
  push:
    branches:
      - main
    paths:
      - "charts/open-webui/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Dependency Repos
        run: |
          helm repo add ollama https://otwld.github.io/ollama-helm/
          helm repo add open-webui https://helm.openwebui.com/

      - name: Build chart dependencies
        run: helm dependency build ./charts/open-webui

      - name: Lint with default values
        run: helm lint ./charts/open-webui

  template:
    name: Template render
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Dependency Repos
        run: |
          helm repo add ollama https://otwld.github.io/ollama-helm/
          helm repo add open-webui https://helm.openwebui.com/

      - name: Build chart dependencies
        run: helm dependency build ./charts/open-webui

      - name: Template with default values
        run: helm template garnet ./charts/open-webui --namespace garnet > /dev/null
