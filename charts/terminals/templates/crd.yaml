{{- if .Values.crd.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: terminals.openwebui.com
  labels:
    {{- include "terminals.labels" . | nindent 4 }}
spec:
  group: openwebui.com
  scope: Namespaced
  names:
    plural: terminals
    singular: terminal
    kind: Terminal
    listKind: TerminalList
    shortNames:
      - term
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  description: Open WebUI user ID that owns this terminal.
                image:
                  type: string
                  default: "ghcr.io/open-webui/open-terminal:latest"
                  description: Container image for the Open Terminal instance.
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "256Mi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "1"
                        memory:
                          type: string
                          default: "1Gi"
                idleTimeoutMinutes:
                  type: integer
                  default: 30
                  minimum: 1
                  description: >-
                    Minutes of inactivity before the terminal pod is stopped.
                packages:
                  type: array
                  items:
                    type: string
                  default: []
                  description: Apt packages to pre-install in the terminal.
                pipPackages:
                  type: array
                  items:
                    type: string
                  default: []
                  description: Pip packages to pre-install in the terminal.
                persistence:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    size:
                      type: string
                      default: "1Gi"
                    storageClass:
                      type: string
                      default: ""
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Provisioning
                    - Running
                    - Idle
                    - Error
                podName:
                  type: string
                serviceName:
                  type: string
                serviceUrl:
                  type: string
                  description: Full URL (http://svc:port) reachable within the cluster.
                apiKeySecret:
                  type: string
                  description: Name of the Secret holding the terminal API key.
                lastActivityAt:
                  type: string
                  format: date-time
                  description: Timestamp of the last proxied request.
                message:
                  type: string
                  description: Human-readable status message.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: User
          type: string
          jsonPath: .spec.userId
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Service URL
          type: string
          jsonPath: .status.serviceUrl
          priority: 1
        - name: Last Activity
          type: date
          jsonPath: .status.lastActivityAt
{{- end }}
