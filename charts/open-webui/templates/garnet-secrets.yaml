{{- if .Values.garnetSecrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "garnet.secretName" . }}
  namespace: {{ include "open-webui.namespace" . }}
  labels:
    {{- include "base.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.garnetSecrets.keys.redisUrl | default "redis-url" }}: {{ required "garnetSecrets.redisUrl is required when garnetSecrets.create=true" .Values.garnetSecrets.redisUrl | quote }}
{{- end }}
